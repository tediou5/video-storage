[package]
name = "video-storage"
version = "0.1.0"
edition = "2024"

[dependencies]
futures = "0.3"
bytes = "1"
mime_guess = "2"
ffmpeg-next = "7.1.0"

tracing = "0.1"
tracing-subscriber = { version = "0.3" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"

axum = { version = "0.8.4" }
axum-server = { version = "0.7.2", features = ["tls-rustls"] }

anyhow = "1.0"
